name: Create Release

# バージョン番号のタグ（例: 1.0.0）を push したときに
# プラグインの zip を生成し、GitHub Release に添付する。
on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      PLUGIN_SLUG: my-block-theme-plugin
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      # WordPress プラグインとしてそのままインストールできるよう、
      # スラッグ名のディレクトリ配下に配置してから zip 化する。
      - name: Build plugin zip
        run: |
          mkdir -p "dist/${PLUGIN_SLUG}"
          rsync -a \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='dist' \
            ./ "dist/${PLUGIN_SLUG}/"
          (cd dist && zip -r "${PLUGIN_SLUG}.zip" "${PLUGIN_SLUG}")

      - name: Create Release
        # softprops/action-gh-release v2.6.1
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          generate_release_notes: true
          files: dist/${{ env.PLUGIN_SLUG }}.zip
